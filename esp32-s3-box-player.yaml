    touchscreen_id: my_touchscreen
    pages: 
      - albums_page
    x_min: 20
    x_max: 300
    y_min: 138
    y_max: 174
    on_click:
      then:
        - lambda: |-
            int idx = (id(album_page_index) * 3) + 2;
            if (idx < id(global_albums).size()) {
              id(ha_album).publish_state(id(global_albums)[idx]);
              id(s3_box_display).show_page(id(player_page));
            }
        - homeassistant.service:
            service: input_select.select_option
            data:
              entity_id: input_select.music_assistant_album_select
            data_template:
              option: !lambda 'return id(ha_album).state;'



  # Bladerknop: VORIGE PAGINA (Links onderaan - Exact op het icoon)
  - platform: touchscreen
    id: btn_album_prev
    touchscreen_id: my_touchscreen
    pages:
      - albums_page
    x_min: 0
    x_max: 90
    y_min: 190  # Ruime touchzone rondom de knoppenbalk onderaan
    y_max: 240
    on_click:
      then:
        - lambda: |-
            if (id(album_page_index) > 0) {
              id(album_page_index)--;
            }
        - component.update: s3_box_display

  # Bladerknop: VOLGENDE PAGINA (Rechts onderaan - Exact op het icoon)
  - platform: touchscreen
    id: btn_album_next
