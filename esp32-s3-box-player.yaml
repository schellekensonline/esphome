          const int center_x = ${display_width} / 2;
          const int line_height = ${normal_font_size}*1.5;
          int text_y = ${artist_y}+${normal_font_size}*0.5+(line_height); // changes add line_height for every following line CENTER alligned

          it.fill(id(color_dark_gray));
          it.print(center_x, ${title_y}, id(font_title), id(color_white), TextAlign::CENTER, "Status en Instellingen");
