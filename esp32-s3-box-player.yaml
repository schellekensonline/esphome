              id(album_page_index)++;
            }
        - component.update: s3_box_display



# ==============================================================================
# 5. LETTERTYPEN & AFBEELDINGEN (Essentieel voor de rendering)
# ==============================================================================
font:
  - file: "gfonts://Roboto"
    id: font_title
    size: ${title_font_size}
  - file: "gfonts://Roboto"
    id: font_artist
    size: ${artist_font_size}
  - file: "gfonts://Material Symbols Outlined"
    id: font_icons
    size: ${player_icon_font_size}
    glyphs: 
      - "\uE045" # Skip Previous
      - "\uE044" # Skip Next
      - "\uE037" # Play Icon (Inactief/Gepauzeerd state)
      - "\uE035" # Pause Icon (Actief spelend state)
      - "\uE050" # Volume Up / Unmuted Icon
      - "\uE04F" # Volume Mute Icon

# ==============================================================================
# 1. COLOR DEFINITIES (Centrale plek voor herbruikbare kleurelementen)
# ==============================================================================
color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_dark_gray
    red: 20%
    green: 20%
    blue: 20%
  - id: color_green
    red: 0%
    green: 80%
    blue: 0%
  - id: color_red
    red: 90%
    green: 10%
    blue: 10%
  - id: color_light_gray
    red: 60%
    green: 60%
    blue: 60%


# Scherm driver SPI Bus initialisatie
spi:
  - id: spi_bus
    clk_pin: GPIO7
    mosi_pin: GPIO6

# ==============================================================================
# 3. DISPLAY CONFIGURATIE MET METADATA EN MULTI-PAGES
# ==============================================================================
display:
  - platform: mipi_spi
    model: ILI9342
    id: s3_box_display
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: 
      number: GPIO48
      inverted: false
    data_rate: 40MHz
    color_depth: 16
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    pages:
      - id: player_page
        lambda: |-
          int center_x = 160;
          // 1. Achtergrond wissen
          it.fill(id(color_dark_gray));

          // 2. Nu Spelend Titel (Scrollend op basis van variabele)
          if (id(sendspin_title).has_state()) {
            std::string title = id(sendspin_title).state;
            
            if (title.length() > ${max_title_length}) {
              title += "        "; 
              int scroll_pos = (millis() / 150) % title.length();
              std::string scrolled_title = title.substr(scroll_pos) + title.substr(0, scroll_pos);
              
              // Snijdt de string af op de exact ingestelde lengte
              scrolled_title = scrolled_title.substr(0, ${max_title_length});
              it.print(center_x, ${title_y}, id(font_title), id(color_white), TextAlign::CENTER, scrolled_title.c_str());
            } else {
              it.print(center_x, ${title_y}, id(font_title), id(color_white), TextAlign::CENTER, title.c_str());
            }
          } else {
            it.print(center_x, ${title_y}, id(font_title), id(color_light_gray), TextAlign::CENTER, "Geen muziek");
          }

          // 3. Nu Spelend Artiest (Afgekapt met puntjes op basis van variabele)
          if (id(sendspin_artist).has_state()) {
            std::string artist = id(sendspin_artist).state;
            
            if (artist.length() > ${max_artist_length}) {
              // Berekent dynamisch de lengte vóór de puntjes (ingestelde lengte minus 3)
              artist = artist.substr(0, ${max_artist_length} - 3) + "...";
            }
            it.print(center_x, ${artist_y}, id(font_artist), id(color_light_gray), TextAlign::CENTER, artist.c_str());
          } else {
            it.print(center_x, ${artist_y}, id(font_artist), id(color_dark_gray), TextAlign::CENTER, "Onbekende artiest");
          }

          // 4. Automatische berekening van de statusbalk hoogte, iconen y-as, en album art positie
          int bar_start_y = 240 - (${player_icon_font_size} + 16);
          int icon_center_y = bar_start_y + ((${player_icon_font_size} + 16) / 2);

          // ==============================================================================
          // DYNAMISCH GEZENTREERD ALBUMPLAATJE / MEDIAPLAYER ICON
          // ==============================================================================
          int tekst_onderkant_y = ${artist_y}+(${artist_font_size}/2);           
          int image_center_y = tekst_onderkant_y + ((bar_start_y - tekst_onderkant_y) / 2);

          // Teken de afbeelding
          it.image(center_x, image_center_y, id(mass_album_art), ImageAlign::CENTER);

          // ==============================================================================
          // AUTOMATISCH BEREKENDE KNOPPENBALK OP BASIS VAN FONT SIZE
          // ==============================================================================
          it.line(0, bar_start_y, 320, bar_start_y, id(color_light_gray));

          // Kolom 1: PREV
          it.print(40, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE045");
          
          // Kolom 2: PLAY / PAUSE DYNAMISCH
          if (id(pcm5101_player).state == 2) {
            it.print(120, icon_center_y, id(font_icons), id(color_green), TextAlign::CENTER, "\uE035"); 
          } else {
            it.print(120, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE037"); 
          }
          
          // Kolom 3: NEXT
          it.print(200, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE044");
          
          // Kolom 4: MUTE DYNAMISCH
          if (id(pcm5101_player).is_muted()) {
            it.print(280, icon_center_y, id(font_icons), id(color_red), TextAlign::CENTER, "\uE04F"); 
          } else {
            it.print(280, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE050"); 
          }

      # ==============================================================================
      # PAGINA 2: Favorieten radio stations (Geheugenveilige Modern C++ Versie)
      # ==============================================================================
      - id: radio_stations_page
        lambda: |-
          int center_x = 160;
          int bar_start_y = 240 - (${player_icon_font_size} + 16);
          int icon_center_y = bar_start_y + ((${player_icon_font_size} + 16) / 2);

          it.fill(id(color_dark_gray));

          // Pagina Titel
          it.print(center_x, 20, id(font_title), id(color_white), TextAlign::CENTER, "Favoriete Zenders");
          it.line(20, 38, 300, 38, id(color_light_gray));

          // Wis de oude lijst en vul de globale vector opnieuw met schone namen
          id(global_stations).clear();
          std::string raw_options = id(ha_radio_options_list).has_state() ? id(ha_radio_options_list).state : "";
          
          if (!raw_options.empty() && raw_options != "Laden..." && raw_options != "Geen favorieten gevonden") {
            std::stringstream ss(raw_options);
            std::string item;
            while (std::getline(ss, item, ',')) {
              if (!item.empty()) {
                size_t start = item.find_first_not_of(" []\"'");
                size_t end = item.find_last_not_of(" []\"'");
                if (start != std::string::npos && end != std::string::npos) {
                  id(global_stations).push_back(item.substr(start, end - start + 1));
                }
              }
            }
          }

          std::string current_playing = id(ha_radio_station).has_state() ? id(ha_radio_station).state : "";

          // Failsafe: Als de lijst leeg is
          if (id(global_stations).empty()) {
            it.print(center_x, 110, id(font_artist), id(color_light_gray), TextAlign::CENTER, "Geen favorieten gevonden");
            it.print(center_x, 140, id(font_artist), id(color_dark_gray), TextAlign::CENTER, "Markeer favorieten in Music Assistant");
            it.line(0, bar_start_y, 320, bar_start_y, id(color_light_gray));
            return;
          }

          // Teken de 3 rijen zenders (Gebruik vanaf nu id(global_stations))
          int start_index = id(radio_page_index) * 3;
          int y_offset = 50;
          int row_height = 36;  
          int spacing = 8;

          for (int i = 0; i < 3; i++) {
            int current_idx = start_index + i;
            if (current_idx >= id(global_stations).size()) break;

            std::string station_name = id(global_stations)[current_idx];

            int current_y = y_offset + (i * (row_height + spacing));

            bool is_active = (current_playing == station_name);

            if (is_active) {
              it.filled_rectangle(20, current_y, 280, row_height, id(color_green));
              it.print(center_x, current_y + (row_height/2), id(font_artist), id(color_dark_gray), TextAlign::CENTER, station_name.c_str());
            } else {
              it.filled_rectangle(20, current_y, 280, row_height, id(color_light_gray));
              it.print(center_x, current_y + (row_height/2), id(font_artist), id(color_white), TextAlign::CENTER, station_name.c_str());
            }
          }

          // Knoppenbalk onderaan
          it.line(0, bar_start_y, 320, bar_start_y, id(color_light_gray));
          int total_pages = (id(global_stations).size() + 2) / 3;
          
          if (id(radio_page_index) > 0) {
            it.print(40, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE045");
          } else {
            it.print(40, icon_center_y, id(font_icons), id(color_dark_gray), TextAlign::CENTER, "\uE045");
          }
          
          std::string page_text = esphome::str_sprintf("%d / %d", id(radio_page_index) + 1, total_pages);
          it.print(center_x, icon_center_y, id(font_artist), id(color_dark_gray), TextAlign::CENTER, page_text.c_str());

          if ((start_index + 3) < id(global_stations).size()) {
            it.print(280, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE044");
          } else {
            it.print(280, icon_center_y, id(font_icons), id(color_dark_gray), TextAlign::CENTER, "\uE044");
          }
 

