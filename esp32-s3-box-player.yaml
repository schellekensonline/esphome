          it.print(40, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uF7EC");  // Backlight down

          it.print(120, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uF7ED"); // Backlight up

          it.print(200, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE04E"); // Volume down

          it.print(280, icon_center_y, id(font_icons), id(color_white), TextAlign::CENTER, "\uE04D");   // Volume up
