          it.print(center_x, ${artist_y}, id(font_normal), id(color_light_gray), TextAlign::CENTER, "Druk rode cirkel voor volgende pagina");

          // First line
          it.print(${text_margin_x}, text_y, id(font_normal), id(color_white), TextAlign::CENTER_LEFT, "WiFi:");
