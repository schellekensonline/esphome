substitutions:
  name: "esp32-s3-box-player"
  ha_id_name: "esp32_s3_box_player"  # HA entity name of the box typically name but with _ iso. -
  ha_ip_port: !secret ha_ip_port
  friendly_name: "ESP32 S3 Box player"
  
  # media player ID van Music assistant in Home assistant 
  speaker_buffer_duration: 1000ms
  speaker_timeout: 500ms

  # 1. Titel artiest max string breedtes
  max_title_length: "22"
  max_artist_length: "26"

  # 2. Lettertype-toewijzing (Wissel hier eenvoudig tussen klein en groot)
  title_font_size: "24"
  artist_font_size: "18"  
  player_icon_font_size: "28"    
  player_icon_touch_ymax: "196"  #  240 - (${player_icon_font_size} + 16);
  title_y: ${title_font_size}    # same as title_font_size
  artist_y: "54"                 # title_font_size*1.5 + artist_font_size

esphome:
  name: ${name}
  friendly_name: ${friendly_name} 
  includes:
    - <sstream>

esp32:
  board: esp32-s3-devkitc-1  # Generiek S3 board dat door esp-idf wél herkend wordt
  variant: esp32s3           # Vertelt ESPHome dat het om de S3-architectuur gaat
  framework:
    type: esp-idf

# VEREIST: Activeer de Octal PSRAM voor de S3-BOX
psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Enable Home Assistant API
api:
  id: api_id                    # <--- VOEG DEZE LIJN TOE
  encryption:
    key: !secret api_key
  homeassistant_services: true  # <--- ZORG DAT DEZE REGEL AANSTAAT

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

wifi:
  id: wifi_wificomponent # <-- Dit zorgt ervoor dat de display-lambda de wifi kan vinden!
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-S3-Box-Fallback-Hotspot"
    password: !secret wifi_password

captive_portal:

## FIND INFO ON
## https://github.com/BigBobbas/ESP32-S3-Box3-Custom-ESPHome/blob/main/instructions/make%20it%20your%20own.md

## You can change the friendly name if you wish on line 7 below. The friendly name is how the device will show in HA
## However the <name:> is how HA connects to the device eg. esp32-s3-box.local is the mDNS hostname for the device.
## Once added to HA changing the device name can lead to connection issues, between HA and the device.

## https://www.home-assistant.io/voice_control/s3_box_voice_assistant/


globals:
  - id: radio_page_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: global_stations
    type: std::vector<std::string>
  - id: album_page_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: global_albums
    type: std::vector<std::string>

# Sendspin integratie die verbinding maakt met Music Assistant
sendspin:
  id: sendspin_hub
  task_stack_in_psram: true 


# HTTP Request is nodig om de albumart URL daadwerkelijk te downloaden
http_request:
  useragent: esphome/device
  timeout: 2s                 # Voorkomt dat een trage download de audio-sockets blokkeert
  # verify_ssl: false
  # buffer_size_rx: 1024
  # buffer_size_tx: 256

switch:
  # # Activeert de interne stroomvoorziening naar de TT21100 touch-chip op de v1 hardware
  # - platform: gpio
  #   pin: GPIO47              # De fysieke VEXT stroomschakelaar-pin op de S3-BOX v1
  #   id: vext_power_switch
  #   restore_mode: ALWAYS_ON   # Dwingt de box om direct bij het opstarten stroom te geven
  # fysieke schakelaar om interne speaker aan te zetten (default uit)
  - platform: gpio
    name: Speaker Enable
    id: speaker_enable
    pin: 
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    disabled_by_default: true

# 2. Backlight inschakelen (Essentieel voor de S3-BOX!)
output:
  - platform: ledc
    pin: 
      number: GPIO45
      ignore_strapping_warning: true
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: ALWAYS_ON # Zorgt dat het scherm direct oplicht bij booten

# I2C Bus initialisatie voor
# de interne TT21100 touch-chip van de S3-BOX v1
# interne dac speaker
# interne adc microfoon
i2c:
  - id: i2c_bus
    sda: GPIO08
    scl: GPIO18
    scan: true
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 400kHz

# ==============================================================================
# 6. TOUCH CONTROLS HARDWARE DRIVER (Eénmalig te definiëren)
# ==============================================================================
touchscreen:
  - platform: tt21100
    id: my_touchscreen
    i2c_id: i2c_bus  # Luistert naar de pinnen 41 en 42
    interrupt_pin: 
        number: GPIO3
        ignore_strapping_warning: true
    transform:
      mirror_x: true

## Audio
# 1. De fysieke audio-bus instellen voor PCM5xxx
i2s_audio:
  - id: external_i2s_bus
    i2s_bclk_pin: GPIO43
    i2s_lrclk_pin: GPIO14
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO47
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2


# voor interne microfoon
audio_adc: 
  - platform: es7210
    id: es7210_adc
    i2c_id: i2c_bus
    bits_per_sample: 16bit
    sample_rate: 16000

# voor interne speaker
audio_dac: 
  - platform: es8311
    id: es8311_dac
    i2c_id: i2c_bus
    bits_per_sample: 16bit
    sample_rate: 48000

# interne microfoon
microphone: 
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: i2s_audio_bus
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external


speaker:
  # fysieke PCM5101 DAC koppelen als speaker-hardware
  - platform: i2s_audio
    id: pcm5101_speaker
    i2s_audio_id: external_i2s_bus
    i2s_dout_pin: GPIO44
    dac_type: external
    channel: stereo
    buffer_duration: ${speaker_buffer_duration}
    timeout: ${speaker_timeout}
  # fysieke interne DAC koppelen als speaker-hardware
  - id: i2s_audio_speaker
    platform: i2s_audio
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 100ms


# ==============================================================================
# 1. DE AUDIOBRON (Staat los als hoofdcomponent, NIET ingesprongen!)
# ==============================================================================
media_source:
  - platform: sendspin
    id: sendspin_audio_source

# ==============================================================================
# 2. DE MEDIA PLAYER & PIPELINE (Koppelt de DAC aan de audiobron)
# ==============================================================================
media_player:
  - platform: speaker_source
    id: pcm5101_player
    name: "Media player"
    media_pipeline:
      speaker: pcm5101_speaker
      sources:
        - sendspin_audio_source

# 3. De Online Image component die de URL downloadt en in het geheugen buffert
online_image:
  - id: mass_album_art
    url: "https://lipsum.app/100x100/"
    format: JPEG
    type: RGB565
    resize: "100x100" # Zorgt ervoor dat de ESP32 de grote webabeelding verkleint naar het schermformaat

# ==============================================================================
# 4. SENDSPIN METADATA SENSORS AND ALBUMART THROUGH HA
# ==============================================================================
text_sensor:
  - platform: sendspin
    name: "Sendspin Title"
    id: sendspin_title
    type: title
    on_value:
      then:
        - component.update: s3_box_display

  - platform: sendspin
    name: "Sendspin Artist"
    id: sendspin_artist
    type: artist
    on_value:
      then:
        - component.update: s3_box_display
 
  - platform: homeassistant
    id: mass_album_art_url
    entity_id: media_player.${ha_id_name}
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            if (x.empty()) {
              ESP_LOGD("main", "Geen muziek actief of geen albumhoes gevonden.");
            } else {
              std::string full_url = x;
              
              // Soms geeft HA een lokaal relatief pad (/api/...) i.p.v. een directe Spotify URL.
              // Als het pad met '/' begint, plakken we jouw Home Assistant IP-adres ervoor:
              if (x.rfind("/", 0) == 0) {
                full_url = str_sprintf("%s%s", "${ha_ip_port}", x.c_str()); // Pas dit IP aan naar jouw HA server!
              }
              
              ESP_LOGD("main", "Nieuwe albumhoes URL doorsturen: %s", full_url.c_str());
              
              // Update de URL van de online_image component en start de download
              id(mass_album_art).set_url(full_url);
              id(mass_album_art).update();
            }

  # 1. Jouw huidige sensor (bevat de zender die NU geselecteerd is)
  - platform: homeassistant
    name: "Geselecteerde Radiozender vanaf HA"
    entity_id: input_select.music_assistant_radio_select
    id: ha_radio_station
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Geen favorieten gevonden";'  # text should match with HA input_select
            then:
              - homeassistant.service:
                  service: automation.trigger
                  data:
                    entity_id: automation.music_assistant_get_radiostations_auto


  # 2. Deze sensor haalt de complete lijst met alle zenders binnen via het attribuut
  - platform: homeassistant
    name: "Beschikbare Radiozenders Lijst"
    entity_id: input_select.music_assistant_radio_select
    attribute: options
    id: ha_radio_options_list

  # 1. Jouw huidige sensor (bevat het album dat NU geselecteerd is)
  - platform: homeassistant
    name: "Geselecteerde Album vanaf HA"
    entity_id: input_select.music_assistant_album_select
    id: ha_album
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Geen favorieten gevonden";' # text should match with HA input_select
            then:
              - homeassistant.service:
                  service: automation.trigger
                  data:
                    entity_id: automation.music_assistant_get_albums_auto


  # 2. Deze sensor haalt de complete lijst met alle albums binnen via het attribuut
  - platform: homeassistant
    name: "Beschikbare Albums Lijst"
    entity_id: input_select.music_assistant_album_select
    attribute: options
    id: ha_album_options_list

sensor:
  - platform: wifi_signal
    name: "WiFi db"
    id: wifi_signal_db
    update_interval: 60s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal"
    id: wifi_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""

#   - platform: sendspin
#     name: "Track Progress"
#     type: track_progress
#   - platform: sendspin
#     name: "Track Duration"
#     type: track_duration
#   - platform: sendspin
#     name: "Track Number"
#     type: track
#   - platform: sendspin
#     name: "Year"
#     type: year

binary_sensor:
# ==============================================================================
# 2. Fisieke knoppen
# ==============================================================================
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
      ignore_strapping_warning: true
    id: left_top_button
    internal: true

# ==============================================================================
# 2. Rode Cirkel Home knop (Togglet dynamisch opeenvolgend door alle pagina's)
# ==============================================================================
  - platform: tt21100
    id: home_button
    index: 0
    on_click:
      min_length: 10ms
      max_length: 500ms
      then:
        - lambda: |-
            if (id(s3_box_display).get_active_page() == id(player_page)) {
              id(s3_box_display).show_page(id(radio_stations_page));
            } else if (id(s3_box_display).get_active_page() == id(radio_stations_page)) {
              id(s3_box_display).show_page(id(albums_page));
            } else if (id(s3_box_display).get_active_page() == id(albums_page)) {
              id(s3_box_display).show_page(id(settings_page));
            } else {
              id(s3_box_display).show_page(id(player_page));
            }
        - component.update: s3_box_display


# ==============================================================================
# 2. DIRECTE MUSIC ASSISTANT CONTROLS VIA SENDSPIN (Geen Home Assistant nodig!)
# ==============================================================================
  # Media Knop 1: PREV
  - platform: touchscreen
    id: btn_media_prev
    touchscreen_id: my_touchscreen
    internal: true
    pages:
      - player_page
    x_min: 0
    x_max: 80
    y_min: ${player_icon_touch_ymax}
    y_max: 240
    on_click:
      then:
        - media_player.previous: pcm5101_player
        - component.update: s3_box_display

  # Media Knop 2: PLAY/PAUSE
  - platform: touchscreen
    id: btn_media_play
    touchscreen_id: my_touchscreen
    internal: true
    pages:
      - player_page
    x_min: 80
    x_max: 160
    y_min: ${player_icon_touch_ymax}
    y_max: 240
    on_click:
      then:
        - media_player.toggle: pcm5101_player
        - component.update: s3_box_display

  # Media Knop 3: NEXT
  - platform: touchscreen
    id: btn_media_next
    touchscreen_id: my_touchscreen
    internal: true
    pages:
      - player_page
    x_min: 160
    x_max: 240
    y_min: ${player_icon_touch_ymax}
    y_max: 240
    on_click:
      then:
        - media_player.next: pcm5101_player
        - component.update: s3_box_display

  # Media Knop 4: MUTE
  - platform: touchscreen
    id: btn_media_mute
    touchscreen_id: my_touchscreen
    internal: true
    pages:
      - player_page
    x_min: 240
    x_max: 320
    y_min: ${player_icon_touch_ymax}
    y_max: 240
    on_click:
      then:
        - if:
            condition:
              lambda: 'return id(pcm5101_player).is_muted();'
            then:
              - media_player.unmute: pcm5101_player
            else:
              - media_player.mute: pcm5101_player
        - component.update: s3_box_display

# ==============================================================================
# Touchscreen Knoppen voor Pagina 2: Radio Stations (100% Quote-Vrij)
# ==============================================================================

  # Rij 1: Bovenste zenderknop (Index 0)
  - platform: touchscreen
    id: btn_radio_row1
    touchscreen_id: my_touchscreen
    pages: 
      - radio_stations_page
    x_min: 20
    x_max: 300
    y_min: 50
    y_max: 86
    on_click:
      then:
        - lambda: |-
            int idx = (id(radio_page_index) * 3) + 0;
            if (idx < id(global_stations).size()) {
              id(ha_radio_station).publish_state(id(global_stations)[idx]);
              id(s3_box_display).show_page(id(player_page));
            }
        - homeassistant.service:
            service: input_select.select_option
            data:
              entity_id: input_select.music_assistant_radio_select
            data_template:
              option: !lambda 'return id(ha_radio_station).state;'

  # Rij 2: Middelste zenderknop (Index 1)
  - platform: touchscreen
    id: btn_radio_row2
    touchscreen_id: my_touchscreen
    pages: 
      - radio_stations_page
    x_min: 20
    x_max: 300
    y_min: 94
    y_max: 130
    on_click:
      then:
        - lambda: |-
            int idx = (id(radio_page_index) * 3) + 1;
            if (idx < id(global_stations).size()) {
              id(ha_radio_station).publish_state(id(global_stations)[idx]);
              id(s3_box_display).show_page(id(player_page));
            }
        - homeassistant.service:
            service: input_select.select_option
            data:
              entity_id: input_select.music_assistant_radio_select
            data_template:
              option: !lambda 'return id(ha_radio_station).state;'


  # Rij 3: Onderste zenderknop (Index + 2)
  - platform: touchscreen
    id: btn_radio_row3
    touchscreen_id: my_touchscreen
    pages: 
      - radio_stations_page
    x_min: 20
    x_max: 300
    y_min: 138
    y_max: 174
    on_click:
      then:
        - lambda: |-
            int idx = (id(radio_page_index) * 3) + 2;
            if (idx < id(global_stations).size()) {
              id(ha_radio_station).publish_state(id(global_stations)[idx]);
              id(s3_box_display).show_page(id(player_page));
            }
        - homeassistant.service:
            service: input_select.select_option
            data:
              entity_id: input_select.music_assistant_radio_select
            data_template:
              option: !lambda 'return id(ha_radio_station).state;'



  # Bladerknop: VORIGE PAGINA (Links onderaan - Exact op het icoon)
  - platform: touchscreen
    id: btn_radio_prev
    touchscreen_id: my_touchscreen
    pages:
      - radio_stations_page
    x_min: 0
    x_max: 90
    y_min: 190  # Ruime touchzone rondom de knoppenbalk onderaan
    y_max: 240
    on_click:
      then:
        - lambda: |-
            if (id(radio_page_index) > 0) {
              id(radio_page_index)--;
            }
        - component.update: s3_box_display

  # Bladerknop: VOLGENDE PAGINA (Rechts onderaan - Exact op het icoon)
  - platform: touchscreen
    id: btn_radio_next
    touchscreen_id: my_touchscreen
    pages:
      - radio_stations_page
    x_min: 230
    x_max: 320
    y_min: 190  # Ruime touchzone rondom de knoppenbalk onderaan
    y_max: 240
    on_click:
      then:
        - lambda: |-
            if ((id(radio_page_index) * 3 + 3) < id(global_stations).size()) {
              id(radio_page_index)++;
            }
        - component.update: s3_box_display


# ==============================================================================
# Touchscreen Knoppen voor Pagina 3: Albums (100% Quote-Vrij)
# ==============================================================================

  # Rij 1: Bovenste zenderknop (Index 0)
  - platform: touchscreen
    id: btn_album_row1
    touchscreen_id: my_touchscreen
