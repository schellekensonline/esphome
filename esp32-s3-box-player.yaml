          } else {
            it.print(center_x, text_y, id(font_normal), id(color_red), TextAlign::CENTER, "Verbinden...");
          }

          // Second line
          text_y = text_y+line_height;
          it.print(${text_margin_x}, text_y, id(font_normal), id(color_white), TextAlign::CENTER_LEFT, "Interne Speaker:");
          if (id(speaker_enable).state) {
            it.print(${display_width}-${text_margin_x}, text_y, id(font_normal), id(color_green), TextAlign::CENTER_RIGHT, "AAN");
          } else {
