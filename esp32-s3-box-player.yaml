          it.print(${text_margin_x}, text_y, id(font_normal), id(color_white), TextAlign::CENTER_LEFT, "Brightness:");
          it.print(${display_width}-${text_margin_x}, text_y, id(font_normal), id(color_white), TextAlign::CENTER_RIGHT, 
                    esphome::str_sprintf("%.0f %%", brightness_percent).c_str());

          // --- Icon bar ---
