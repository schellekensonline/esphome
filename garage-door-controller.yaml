esphome:
  name: garage-door-controller
  friendly_name: "garage door"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Garage-Door-Controller"
    password: !secret wifi_password
# The captive portal component in ESPHome is a fallback mechanism for when connecting to the configured WiFi fails.
captive_portal:

## Relay outputs
#  note: GPIO 5 is a strapping/boot pin
switch:
  - platform: gpio
    pin: 
      number: GPIO23
      inverted: true
    name: "Relay 1"
    id: OUT1
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: OUT1
  - platform: gpio
    pin: 
      number: GPIO5
      inverted: true
    name: "Relay 2"
    id: OUT2
    # on_turn_on:
    #   - delay: 500ms
    #   - switch.turn_off: OUT2
  - platform: gpio
    pin: 
      number: GPIO4
      inverted: true
    name: "Relay 3"
    id: OUT3
    # on_turn_on:
    #   - delay: 500ms
    #   - switch.turn_off: OUT3
  - platform: gpio
    pin: 
      number: GPIO13
      inverted: true
    name: "Relay 4"
    id: OUT4
    # on_turn_on:
    #   - delay: 500ms
    #   - switch.turn_off: OUT4


## Digital inputs
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      inverted: false
      mode:
        input: true
        pullup: true
    name: "Input 1"
    id: IN1
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
  - platform: gpio
    pin:
      number: GPIO26
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Input 2"
    id: IN2
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
  - platform: gpio
    pin:
      number: GPIO27
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Input 3"
    id: IN3
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Input 4"
    id: IN4
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

## RS485 client/master
uart:
  - id: uart_modbus
    tx_pin: GPIO19
    rx_pin: GPIO18
    baud_rate: 9600
    parity: NONE
    stop_bits: 1

modbus:
  - id: modbus_client
    uart_id: uart_modbus
    flow_control_pin: GPIO32
      
modbus_controller:
- id: modbus_master
  modbus_id: modbus_client
  

# ESP32-WROOM-32E N4 (4MB flash)
# https://www.tinytronics.nl/product_files/004702_esp32-wroom-32e_esp32-wroom-32ue_datasheet_en.pdf

# ESP32-WROOM-32E PIN LAYOUT
#             Antenna top
# Name		    Pin No.       Type   CTRL         Function
# GND 		    1 top left    P 		              Ground
# 3V3 		    2             P 		              Power supply
# EN 			    3             I                   High: On; enables the chip, Low: Off; the chip powers off, Note: Do not leave the pin floating.
# SENSOR_VP 	4             I 		              GPIO36, ADC1_CH0, RTC_GPIO0
# SENSOR_VN 	5             I 		              GPIO39, ADC1_CH3, RTC_GPIO3
# IO34 		    6             I 		              GPIO34, ADC1_CH6, RTC_GPIO4
# IO35 		    7             I 		              GPIO35, ADC1_CH7, RTC_GPIO5
# IO32 		    8             I/O		 RS485 (WE)   GPIO32, XTAL_32K_P (32.768 kHz crystal oscillator input), ADC1_CH4, TOUCH9, RTC_GPIO9
# IO33 		    9             I/O		 IN4          GPIO33, XTAL_32K_N (32.768 kHz crystal oscillator output), ADC1_CH5, TOUCH8, RTC_GPIO8
# IO25    		10            I/O 	 IN1          GPIO25, DAC_1, ADC2_CH8, RTC_GPIO6, EMAC_RXD0
# IO26     		11            I/O 	 IN2          GPIO26, DAC_2, ADC2_CH9, RTC_GPIO7, EMAC_RXD1
# IO27    		12            I/O 	 IN3          GPIO27, ADC2_CH7, TOUCH7, RTC_GPIO17, EMAC_RX_DV
# IO14     		13            I/O    G14          GPIO14, ADC2_CH6, TOUCH6, RTC_GPIO16, MTMS, HSPICLK, HS2_CLK, SD_CLK, EMAC_TXD2
# IO12		    14 bot left   I/O 	 G12          GPIO12, ADC2_CH5, TOUCH5, RTC_GPIO15, MTDI, HSPIQ, HS2_DATA2, SD_DATA2, EMAC_TXD3 GND 15 P Ground
# IO13     		16            I/O    OUT4         GPIO13, ADC2_CH4, TOUCH4, RTC_GPIO14, MTCK, HSPID, HS2_DATA3, SD_DATA3, EMAC_RX_ER
# NC 			    17            - 		              See note 2
# NC     			18            - 		              See note 2
# NC 			    19            - 		              See note 2
# NC 		    	20            - 		              See note 2
# NC    			21            - 		              See note 2
# NC 		    	22            -	  	              See note 2
# IO15     		23            I/O 	              GPIO15, ADC2_CH3, TOUCH3, MTDO, HSPICS0, RTC_GPIO13, HS2_CMD, SD_CMD, EMAC_RXD3
# IO2      		24            I/O 	              GPIO2, ADC2_CH2, TOUCH2, RTC_GPIO12, HSPIWP, HS2_DATA0, SD_DATA0
# IO0      		25 bot right  I/O 	              GPIO0, ADC2_CH1, TOUCH1, RTC_GPIO11, CLK_OUT1, EMAC_TX_CLK
# IO4   			26            I/O		 OUT3         GPIO4, ADC2_CH0, TOUCH0, RTC_GPIO10, HSPIHD, HS2_DATA1, SD_DATA1, EMAC_TX_ER
# IO16    		27            I/O		 RX2          GPIO16, HS1_DATA4, U2RXD, EMAC_CLK_OUT 
# IO17        28            I/O    TX2          GPIO17, HS1_DATA5, U2TXD, EMAC_CLK_OUT_180 
# IO5   			29            I/O 	 OUT2         GPIO5, VSPICS0, HS1_DATA6, EMAC_RX_CLK 
# IO18    		30            I/O		 RS485 (RX)   GPIO18, VSPICLK, HS1_DATA7
# IO19    		31            I/O		 RS485 (TX)   GPIO19, VSPIQ, U0CTS, EMAC_TXD0
# NC    			32            -		                -
# IO21    		33            I/O		 G21          GPIO21, VSPIHD, EMAC_TX_EN
# RXD0		    34            I/O		              GPIO3, U0RXD, CLK_OUT2
# TXD0    		35            I/O		              GPIO1, U0TXD, CLK_OUT3, EMAC_RXD2
# IO22    		36            I/O		 G22          GPIO22, VSPIWP, U0RTS, EMAC_TXD1
# IO23    		37            I/O		 OUT1         GPIO23, VSPID, HS1_STROBE
# GND	    		38 top right  P	  	              Ground