esphome:
  name: therma-v-buffer-temperatures
  friendly_name: "Buffer Temperatures"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Buffer-Temperatures"
    password: !secret wifi_password
# The captive portal component in ESPHome is a fallback mechanism for when connecting to the configured WiFi fails.
captive_portal:


one_wire:
  - platform: gpio
    pin: 4
    id: dallas4

sensor:
  - platform: dallas_temp
    one_wire_id: dallas4
    address:  0x4a012211cb3bcc28
    name: "In from Heatpump (T1)" 
    update_interval: 15s 
    accuracy_decimals: 1

  - platform: dallas_temp
    one_wire_id: dallas4
    address:  0x8a012211aa10b628
    name: "Out to Heating (T2)" 
    update_interval: 15s
    accuracy_decimals: 1

  - platform: dallas_temp
    one_wire_id: dallas4
    address:  0xd90122119e601928
    name: "Return from Heating (T3)" 
    update_interval: 15s
    accuracy_decimals: 1

  - platform: dallas_temp
    one_wire_id: dallas4
    address:  0x1c0122120836ef28
    name: "Return to Heatpump (T4)" 
    update_interval: 15s
    accuracy_decimals: 1
    
